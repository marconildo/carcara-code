name: Build Windows

# Quando este build roda:
#  - Manualmente, pelo botão "Run workflow" na aba Actions do GitHub
#  - Automaticamente, quando você cria uma tag começando com "v" (ex: v0.1.0)
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar o instalador (.exe portable)
        run: npm run pack:exe

      # Deixa o .exe disponível pra baixar na própria página da execução,
      # mesmo quando o build foi disparado manualmente (sem tag).
      - name: Publicar o .exe como artefato
        uses: actions/upload-artifact@v4
        with:
          name: CarcaraCode-portable
          path: release/*.exe
          retention-days: 30
          if-no-files-found: error

      # Só quando for uma tag (ex: v0.1.0): cria uma página de Release
      # com o .exe anexado — link bonito e fácil de mandar pra alguém baixar.
      - name: Publicar Release (somente em tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
